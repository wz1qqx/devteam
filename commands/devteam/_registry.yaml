# devteam Command Registry
# Source of truth for all command definitions.
# Run `node bin/generate-commands.cjs` to regenerate .md files.

_skip: []

commands:
  # ═══════════════════════════════════════
  # CORE — Automated Pipeline
  # ═══════════════════════════════════════

  team:
    description: Automated multi-agent pipeline — configurable stages with optimization feedback loops
    argument-hint: "<feature> [--stages spec,plan,code,...] [--max-loops N]"
    objective: Start the automated pipeline for a feature. Select stages with --stages (default all). Supports checkpoint resume if interrupted.
    skill: orchestrator.md
    allowed-tools: [Read, Write, Bash, Glob, Grep, Agent, AskUserQuestion]

  # ═══════════════════════════════════════
  # SESSION MANAGEMENT
  # ═══════════════════════════════════════

  pause:
    description: Save session state for later resume — writes HANDOFF.json and updates STATE.md
    objective: Capture the current session state into HANDOFF.json and STATE.md for zero-loss session handoff.
    skill: pause.md
    allowed-tools: [Read, Write, Bash, Glob, Grep]

  resume:
    description: Restore session state and show current status
    objective: Restore session state from HANDOFF.json, STATE.md, and feature context.md.
    skill: resume.md
    allowed-tools: [Read, Bash, Glob, Grep]

  # ═══════════════════════════════════════
  # PROJECT VIEW
  # ═══════════════════════════════════════

  status:
    description: Project overview — team status, pipeline stage, deployments
    objective: Display a comprehensive project overview including config, worktree states, active deployments, and pipeline stage.
    init-as: status
    allowed-tools: [Read, Bash, Glob, Grep]
    inline-process: "Parse $INIT JSON. Display: active feature, current phase, repos (commits ahead, uncommitted), cluster info, build history, team status if active. Format as dashboard table."

  diff:
    description: Show worktree changes across repositories
    argument-hint: "[repo]"
    objective: Display a summary of uncommitted and staged changes across all worktrees managed by the project.
    init-as: diff
    context-prefix: "diff"
    inline-process: "For each repo in $INIT, run git -C <dev_worktree> diff --stat <base_ref>. If specific repo given, show full diff. Otherwise show summary table."

  # ═══════════════════════════════════════
  # KNOWLEDGE
  # ═══════════════════════════════════════

  learn:
    description: Research a topic (code, URL, or file) and create/update wiki pages
    argument-hint: "<topic|feature|URL|filepath>"
    objective: Research a topic from any source and build/update focused, interlinked wiki pages.
    skill: learn.md
    allowed-tools: [Read, Write, Bash, Glob, Grep, WebSearch, WebFetch, Agent]

  knowledge:
    description: Wiki operations — search, lint, list
    argument-hint: "<search|lint|list> [query]"
    objective: Manage the wiki knowledge base — search for answers, run health checks, or list pages.
    init-as: knowledge
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Parse action (search/lint/list). SEARCH: match wiki/index.md, load pages, synthesize. LINT: check over-long, stale, orphans, dead links. LIST: display index."

  # ═══════════════════════════════════════
  # PROJECT MANAGEMENT
  # ═══════════════════════════════════════

  feature:
    description: List features and select/delete — use at session start to pick active feature
    argument-hint: "[list|delete] [name]"
    objective: Show all features with status, let user select one to bind as active, or delete a feature. When invoked without args, list features and prompt user to choose.
    init-as: workspace
    allowed-tools: [Read, Write, Bash, Glob, Grep, AskUserQuestion]
    inline-process: |
      1. Run CLI: `node "$DEVFLOW_BIN" features list` to get all features with phase/scope
      2. Display features as a table: name, description, phase, scope
      3. If action is `delete`: confirm with AskUserQuestion, then run `node "$DEVFLOW_BIN" features delete <name>`
      4. If action is `list` or no action: use AskUserQuestion to let user pick a feature
      5. Run `node "$DEVFLOW_BIN" features switch <selected>` to bind the selection
      6. Show confirmation: "Feature '<name>' is now active"

  init:
    description: Initialize workspace or add a new feature
    argument-hint: "<workspace|feature> [name]"
    objective: Bootstrap a new workspace (workspace.yaml, directories, baselines) or add a new feature with scope, worktrees, and initial config.
    init-as: workspace
    allowed-tools: [Read, Write, Bash, Glob, Grep, AskUserQuestion]
    inline-process: "Parse action (workspace|feature). WORKSPACE: create workspace.yaml with schema_version 2, create .dev/ directory, configure repos and baselines, set defaults. FEATURE: prompt for name/description/scope, create feature config.yaml, create .dev/features/<name>/ directory, set as active feature."

  cluster:
    description: Manage Kubernetes clusters — add, use, list
    argument-hint: "<add|use|list> [name]"
    objective: Manage cluster profiles in workspace.yaml.
    init-as: cluster
    allowed-tools: [Read, Write, Bash, Glob, AskUserQuestion]
    inline-process: "Parse action (add/use/list). LIST: show clusters + active. USE: switch active_cluster. ADD: interactive cluster config collection (ssh, namespace, safety, hardware), save to workspace.yaml."

  vllm-opt:
    description: Standalone vLLM performance analysis — torch profiler, nsight kernels, optimization guidance
    argument-hint: "<feature> [--regression-report <json>]"
    objective: Run vLLM performance profiling and kernel analysis for a feature. Produces optimization guidance for the planner. Can accept a regression report from a prior verify run or profile from scratch.
    init-as: team-vllm-opt
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: |
      1. Load context via CLI init
      2. Spawn the vllm-opter agent: Agent(subagent_type: "devteam:vllm-opter", prompt: "Analyze performance for feature '$FEATURE'. Workspace: $WORKSPACE. [regression report if provided]")
      3. Display the optimization guidance report returned by the agent

  clean:
    description: Cleanup resources — worktrees, images, K8s resources
    argument-hint: "[--dry-run]"
    objective: Scan for and optionally remove orphan worktrees, stale container images, and stale K8s pods.
    init-as: clean
    allowed-tools: [Read, Bash, Glob, Grep, AskUserQuestion]
    inline-process: "Scan worktrees (orphans not in any feature scope), images (stale), pods (Error/CrashLoop). Report findings. With --dry-run, only report. Otherwise confirm each category before cleanup."
